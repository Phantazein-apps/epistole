name = "email-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "email-mcp"
database_id = "d41be22e-8984-442c-aec8-c10b21ed7cf3"

[[r2_buckets]]
binding = "R2"
bucket_name = "email-attachments"

[[vectorize]]
binding = "VECTORIZE"
index_name = "email-embeddings"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "936b12718acb48e6a253d2dc668bf4b2"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "EmailMcpAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EmailMcpAgent"]

[[routes]]
pattern = "dk-mailstore.phantazein.com"
custom_domain = true
